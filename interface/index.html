<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visor JSONL de Evaluacion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>Visor de Resultados JSONL</h1>
      <p>Tabla de videos con descripcion, razonamiento+score y score real.</p>
    </header>

    <section class="toolbar">
      <select id="results-select" class="results-select">
        <option value="">Cargando archivos...</option>
      </select>
      <label class="file-input-label" for="file-input">Abrir JSONL...</label>
      <input id="file-input" type="file" accept=".jsonl,.txt" />
      <button id="reload-results" type="button">Recargar lista</button>
      <button id="export-real-scores" type="button">Exportar score real (CSV)</button>
      <span id="status" class="status">Sin datos cargados</span>
    </section>

    <section class="tabs">
      <div class="tab-buttons" role="tablist">
        <button class="tab-button active" data-tab="raw">Entradas (JSONL)</button>
        <button class="tab-button" data-tab="comparison">Comparación puntuaciones</button>
      </div>

      <div class="tab-panel" id="tab-raw">
        <div class="table-wrapper">
          <table id="results-table">
            <thead>
              <tr>
                <th>Ruta del video</th>
                <th>Salida Descriptor</th>
                <th>Puntuación Reasoner</th>
                <th>Score real</th>
              </tr>
            </thead>
            <tbody id="results-body"></tbody>
          </table>
        </div>
      </div>

      <div class="tab-panel hidden" id="tab-comparison">
        <div class="comparison-header">
          <div>
            <button id="export-comparison" type="button">Exportar comparación (CSV)</button>
            <button id="rebuild-comparison" type="button">Actualizar gráfico</button>
          </div>
          <div id="comparison-stats" class="comparison-stats">Sin datos</div>
        </div>
        <div class="chart-wrapper">
          <canvas id="scores-chart" width="800" height="400"></canvas>
          <div class="chart-zoom-info" id="chart-zoom-info">Zoom: 1x | Rueda para zoom | Arrastra para mover | Doble-click para reiniciar</div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
